start_mowing:
  name: Start mowing
  description: Start mowing with optional starting zone and duration.
  target:
    entity:
      domain: lawn_mower
      integration: robomow_ble
  fields:
    starting_zone:
      name: Starting zone
      description: Robomow zone to start mowing from.
      required: false
      default: MAIN
      selector:
        select:
          options:
            - MAIN
            - STARTING_POINT_A
            - STARTING_POINT_B
            - SUB_1
            - SUB_2
            - SUB_3
            - SUB_4
    duration:
      name: Duration
      description: Mowing duration in minutes (1-255). Default is 30 minutes.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: box

set_schedule:
  name: Set schedule
  description: Set the mower schedule.
  target:
    entity:
      domain: lawn_mower
      integration: robomow_ble
  fields:
    start_time:
      name: Start time
      description: Time to start mowing each day.
      required: false
      selector:
        time:
    end_time:
      name: End time
      description: Time to end mowing each day.
      required: false
      selector:
        time:
    day_0_enabled:
      name: Monday enabled
      description: Whether to mow on Monday.
      required: false
      selector:
        boolean:
    day_0_duration:
      name: Monday duration
      description: Mowing duration for Monday in minutes (1-255).
      required: false
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: box
    day_0_cycles:
      name: Monday cycles
      description: Number of mowing cycles for Monday (1-2).
      required: false
      selector:
        number:
          min: 1
          max: 2
          step: 1
          mode: box
    day_0_zone:
